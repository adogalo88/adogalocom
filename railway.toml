# Railway Configuration for Adogalo Marketplace

[build]
builder = "nixpacks"
# Use production schema (PostgreSQL) for deploy; DATABASE_URL must be set
# Copy .next/static (CSS/JS) and public ke standalone agar style & assets terbaca
buildCommand = "prisma generate --schema=prisma/schema.production.prisma && next build && cp -r .next/static .next/standalone/.next/ && cp -r public .next/standalone/"

[deploy]
# Pastikan migrate jalan dari app root (/app) pakai schema production, lalu jalankan server dari standalone
startCommand = "cd /app && prisma migrate deploy --schema=prisma/schema.production.prisma && cd .next/standalone && HOSTNAME=0.0.0.0 node server.js"
# Endpoint dedikasi: cepat, tanpa DB, selalu 200. Path "/" bisa lambat/error karena SSR.
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "adogalo-web"

[[services.env]]
name = "NODE_ENV"
value = "production"

[[services.env]]
name = "HOSTNAME"
value = "0.0.0.0"
